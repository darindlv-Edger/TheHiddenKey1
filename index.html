<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE INFINITE HUNT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0f0f0f; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }
        .main-container { 
            text-align: center; 
            max-width: 500px;
            padding: 20px;
        }
        h1 { 
            font-weight: 300; 
            letter-spacing: 0.5rem; 
            font-size: 1.2rem; 
            margin-bottom: 40px;
            text-transform: uppercase;
            color: #888;
        }
        .clue {
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 50px;
            font-weight: 500;
        }
        input { 
            background: transparent; 
            border: none; 
            border-bottom: 1px solid #333; 
            color: #fff; 
            text-align: center; 
            width: 100%;
            padding: 10px 0;
            font-size: 1rem;
            letter-spacing: 2px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input:focus {
            border-bottom: 1px solid #ffffff;
        }
        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1>Foundation . 01</h1>
        <div class="clue">"The more of me there is, the less you see."</div>
        <input type="text" id="answer" placeholder="TYPE YOUR FINDING" autocomplete="off">
    </div>
    <div class="footer">STRICTLY FOR THE PERSISTENT</div>
    <script>
    const input = document.getElementById('answer');
    
    input.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            // We convert to lowercase so "Darkness" and "darkness" both work
            const userAnswer = input.value.toLowerCase().trim();
            
            if (userAnswer === "darkness") {
                // This sends them to the next page
                window.location.href = "phase2.html";
            } else {
                // A subtle "wrong" animation
                input.style.borderColor = "red";
                setTimeout(() => { input.style.borderColor = "#333"; }, 500);
                input.value = "";
            }
        }
    });
</script>
</body>
</html>
