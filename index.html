<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HUNT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* THE CLEAN VIBE */
        body { 
            background-color: #ffffff; 
            color: #1a1a1a; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .wrapper { 
            text-align: center; 
            width: 100%;
            max-width: 400px;
        }
        h1 { 
            font-weight: 300; 
            font-size: 0.75rem; 
            letter-spacing: 0.3rem; 
            color: #999; 
            text-transform: uppercase;
            margin-bottom: 60px;
        }
        .question {
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 40px;
            color: #1a1a1a;
        }
        input { 
            width: 100%;
            padding: 15px 0;
            border: none;
            border-bottom: 1px solid #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
            transition: border-color 0.4s ease;
        }
        input:focus {
            border-bottom: 1px solid #000000;
        }
        /* Error state */
        .error { border-bottom: 1px solid #ff4d4d !important; }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>Foundation / 01</h1>
        <div class="question">The more of me there is, the less you see.</div>
        <input type="text" id="hunt-input" placeholder="Your Answer" autocomplete="off">
    </div>

    <script>
        const inputField = document.getElementById('hunt-input');

        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const val = inputField.value.toLowerCase().trim();
                
                if (val === "darkness") {
                    // This sends them to the second page
                    window.location.href = "phase2.html";
                } else {
                    // Flash red if wrong
                    inputField.classList.add('error');
                    setTimeout(() => { 
                        inputField.classList.remove('error');
                        inputField.value = ""; 
                    }, 500);
                }
            }
        });
    </script>
</body>
</html>
